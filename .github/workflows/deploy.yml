name: Deploy

on:
  push:
    branches: [main]

jobs: 
  deploy: 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          #tagged with commit sha so every deploy is trackable
          tags: |
            ghcr.io/${{ github.repository_owner }}/business-document-rag:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/business-document-rag:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          scripts: |
            cd /opt/business-rag
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{github.actor}} --password-stdin
            docker-compose pull api frontend
            docker-compose up -d --no-deps api frontend
            docker image prune -f
            echo "Deployed: ${{github.sha}}"